<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bg-gradient-divine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fae8ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f3e8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef3c7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg-gradient-divine)"/>
  
  <!-- Decorative Pattern -->
  <circle cx="130" cy="110" r="170" fill="#a855f7" opacity="0.08"/>
  <circle cx="1070" cy="520" r="190" fill="#f59e0b" opacity="0.08"/>
  
  <!-- Logo/Branding (top-left) -->
  <text x="50" y="60" font-family="'Inter', sans-serif" font-size="32" font-weight="700" fill="#1c1917">
    ✨ Asrār
  </text>
  
  <!-- Main Arabic Text (Large, centered) -->
  <text x="600" y="280" font-family="'Amiri', 'Traditional Arabic', serif" font-size="100" font-weight="700" fill="#581c87" text-anchor="middle" filter="url(#glow)">
    الرَّحْمَٰنُ الرَّحِيمُ
  </text>
  
  <!-- Transliteration (Medium) -->
  <text x="600" y="360" font-family="'Crimson Text', serif" font-size="38" fill="#6b21a8" text-anchor="middle" font-style="italic">
    Ar-Raḥmān Ar-Raḥīm
  </text>
  
  <!-- English Translation (Small) -->
  <text x="600" y="410" font-family="'Inter', sans-serif" font-size="24" fill="#7c3aed" text-anchor="middle">
    The Most Merciful, The Most Compassionate
  </text>
  
  <!-- Challenge Badge (bottom-right) -->
  <rect x="890" y="530" width="260" height="60" rx="30" fill="#ffffff" opacity="0.95" stroke="#a855f7" stroke-width="2"/>
  <text x="1020" y="568" font-family="'Inter', sans-serif" font-size="20" font-weight="600" fill="#9333ea" text-anchor="middle">
    Divine Names • Asrār
  </text>
</svg>
