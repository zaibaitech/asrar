<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fde68a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed7aa;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>
  
  <!-- Decorative Pattern -->
  <circle cx="100" cy="100" r="150" fill="#f59e0b" opacity="0.1"/>
  <circle cx="1100" cy="530" r="200" fill="#14b8a6" opacity="0.08"/>
  
  <!-- Logo/Branding (top-left) -->
  <text x="50" y="60" font-family="'Inter', sans-serif" font-size="32" font-weight="700" fill="#292524">
    ✨ Asrār
  </text>
  
  <!-- Main Arabic Text (Large, centered) -->
  <text x="600" y="280" font-family="'Amiri', 'Traditional Arabic', serif" font-size="96" font-weight="700" fill="#1c1917" text-anchor="middle" filter="url(#glow)">
    صَلَّى اللهُ عَلَيْهِ وَسَلَّمَ
  </text>
  
  <!-- Transliteration (Medium) -->
  <text x="600" y="360" font-family="'Crimson Text', serif" font-size="36" fill="#44403c" text-anchor="middle" font-style="italic">
    Ṣallā Llāhu ʿalayhi wa-sallam
  </text>
  
  <!-- English Translation (Small) -->
  <text x="600" y="410" font-family="'Inter', sans-serif" font-size="24" fill="#57534e" text-anchor="middle">
    Blessings and peace be upon him
  </text>
  
  <!-- Challenge Badge (bottom-right) -->
  <rect x="920" y="530" width="230" height="60" rx="30" fill="#ffffff" opacity="0.9" stroke="#f59e0b" stroke-width="2"/>
  <text x="1035" y="568" font-family="'Inter', sans-serif" font-size="20" font-weight="600" fill="#ea580c" text-anchor="middle">
    Ṣalawāt Challenge
  </text>
</svg>
