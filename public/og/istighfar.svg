<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bg-gradient-istighfar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#bfdbfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c7d2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg-gradient-istighfar)"/>
  
  <!-- Decorative Pattern -->
  <circle cx="120" cy="120" r="160" fill="#3b82f6" opacity="0.08"/>
  <circle cx="1080" cy="510" r="180" fill="#10b981" opacity="0.08"/>
  
  <!-- Logo/Branding (top-left) -->
  <text x="50" y="60" font-family="'Inter', sans-serif" font-size="32" font-weight="700" fill="#1e293b">
    ✨ Asrār
  </text>
  
  <!-- Main Arabic Text (Large, centered) -->
  <text x="600" y="280" font-family="'Amiri', 'Traditional Arabic', serif" font-size="110" font-weight="700" fill="#0f172a" text-anchor="middle" filter="url(#glow)">
    أَسْتَغْفِرُ اللهَ
  </text>
  
  <!-- Transliteration (Medium) -->
  <text x="600" y="360" font-family="'Crimson Text', serif" font-size="38" fill="#334155" text-anchor="middle" font-style="italic">
    Astaghfiru Llāh
  </text>
  
  <!-- English Translation (Small) -->
  <text x="600" y="410" font-family="'Inter', sans-serif" font-size="24" fill="#475569" text-anchor="middle">
    I seek forgiveness from Allah
  </text>
  
  <!-- Challenge Badge (bottom-right) -->
  <rect x="900" y="530" width="250" height="60" rx="30" fill="#ffffff" opacity="0.95" stroke="#3b82f6" stroke-width="2"/>
  <text x="1025" y="568" font-family="'Inter', sans-serif" font-size="20" font-weight="600" fill="#2563eb" text-anchor="middle">
    Istighfār Challenge
  </text>
</svg>
