<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bg-gradient-default" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fde68a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed7aa;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg-gradient-default)"/>
  
  <!-- Decorative Stars and Crescent -->
  <circle cx="100" cy="100" r="150" fill="#f59e0b" opacity="0.12"/>
  <text x="1050" y="150" font-size="120" opacity="0.15">🌙</text>
  <text x="180" y="520" font-size="80" opacity="0.12">⭐</text>
  <circle cx="1080" cy="530" r="200" fill="#14b8a6" opacity="0.08"/>
  
  <!-- Logo/Branding (top-left) -->
  <text x="50" y="60" font-family="'Inter', sans-serif" font-size="32" font-weight="700" fill="#292524">
    ✨ Asrār
  </text>
  
  <!-- Main Arabic Text (Large, centered) -->
  <text x="600" y="260" font-family="'Amiri', 'Traditional Arabic', serif" font-size="100" font-weight="700" fill="#7c2d12" text-anchor="middle" filter="url(#glow)">
    رَمَضَانَ مُبَارَك
  </text>
  
  <!-- Transliteration (Medium) -->
  <text x="600" y="340" font-family="'Crimson Text', serif" font-size="40" fill="#92400e" text-anchor="middle" font-style="italic">
    Ramaḍān Mubārak
  </text>
  
  <!-- English Translation (Small) -->
  <text x="600" y="395" font-family="'Inter', sans-serif" font-size="26" fill="#9a3412" text-anchor="middle">
    Blessed Ramadan
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="445" font-family="'Inter', sans-serif" font-size="22" fill="#a8a29e" text-anchor="middle">
    Track Your Spiritual Journey
  </text>
  
  <!-- Challenge Badge (bottom-right) -->
  <rect x="870" y="530" width="280" height="60" rx="30" fill="#ffffff" opacity="0.95" stroke="#f59e0b" stroke-width="2"/>
  <text x="1010" y="568" font-family="'Inter', sans-serif" font-size="20" font-weight="600" fill="#ea580c" text-anchor="middle">
    Spiritual Challenges • Asrār
  </text>
</svg>
