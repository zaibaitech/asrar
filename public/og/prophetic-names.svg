<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bg-gradient-prophetic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d1fae5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a7f3d0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef3c7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Islamic Geometric Pattern -->
    <pattern id="geometric" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="2" fill="#059669" opacity="0.15"/>
    </pattern>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg-gradient-prophetic)"/>
  <rect width="1200" height="630" fill="url(#geometric)"/>
  
  <!-- Decorative Elements -->
  <circle cx="110" cy="100" r="150" fill="#10b981" opacity="0.08"/>
  <circle cx="1090" cy="530" r="180" fill="#f59e0b" opacity="0.08"/>
  
  <!-- Logo/Branding (top-left) -->
  <text x="50" y="60" font-family="'Inter', sans-serif" font-size="32" font-weight="700" fill="#064e3b">
    ✨ Asrār
  </text>
  
  <!-- Main Arabic Text (Large, centered) -->
  <text x="600" y="270" font-family="'Amiri', 'Traditional Arabic', serif" font-size="92" font-weight="700" fill="#064e3b" text-anchor="middle" filter="url(#glow)">
    ٱلنَّبِيُّ ٱلْأُمِّيُّ
  </text>
  
  <!-- Transliteration (Medium) -->
  <text x="600" y="350" font-family="'Crimson Text', serif" font-size="36" fill="#065f46" text-anchor="middle" font-style="italic">
    An-Nabiyyu l-Ummiyy
  </text>
  
  <!-- English Translation (Small) -->
  <text x="600" y="400" font-family="'Inter', sans-serif" font-size="23" fill="#047857" text-anchor="middle">
    The Unlettered Prophet
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="440" font-family="'Inter', sans-serif" font-size="18" fill="#059669" text-anchor="middle" opacity="0.8">
    Dalāʾilu l-Khayrāt • 201 Names
  </text>
  
  <!-- Challenge Badge (bottom-right) -->
  <rect x="920" y="530" width="230" height="60" rx="30" fill="#ffffff" opacity="0.95" stroke="#10b981" stroke-width="2"/>
  <text x="1035" y="568" font-family="'Inter', sans-serif" font-size="20" font-weight="600" fill="#059669" text-anchor="middle">
    201 Names • Asrār
  </text>
</svg>
