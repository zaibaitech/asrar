<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bg-gradient-debt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fcd34d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle Pattern -->
    <pattern id="pattern-debt" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <circle cx="25" cy="25" r="2" fill="#d97706" opacity="0.1"/>
    </pattern>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg-gradient-debt)"/>
  <rect width="1200" height="630" fill="url(#pattern-debt)"/>
  
  <!-- Decorative Elements -->
  <circle cx="120" cy="110" r="160" fill="#f59e0b" opacity="0.15"/>
  <circle cx="1080" cy="520" r="180" fill="#fbbf24" opacity="0.12"/>
  
  <!-- Logo/Branding (top-left) -->
  <text x="50" y="60" font-family="'Inter', sans-serif" font-size="32" font-weight="700" fill="#78350f">
    ✨ Asrār
  </text>
  
  <!-- Badge: "1000×" (top-right corner) -->
  <circle cx="1120" cy="80" r="50" fill="#78350f" opacity="0.95"/>
  <text x="1120" y="90" font-family="'Inter', sans-serif" font-size="28" font-weight="900" fill="#fef3c7" text-anchor="middle">
    1000×
  </text>
  
  <!-- Main Arabic Text (Large, centered) -->
  <text x="600" y="260" font-family="'Amiri', 'Traditional Arabic', serif" font-size="88" font-weight="700" fill="#78350f" text-anchor="middle" filter="url(#glow)">
    وَمَا ذَٰلِكَ عَلَى اللهِ بِعَزِيزٍ
  </text>
  
  <!-- Transliteration (Medium) -->
  <text x="600" y="340" font-family="'Crimson Text', serif" font-size="34" fill="#92400e" text-anchor="middle" font-style="italic">
    Wamā dhālika ʿalā llāhi bi-ʿAzīzin
  </text>
  
  <!-- English Translation (Small) -->
  <text x="600" y="390" font-family="'Inter', sans-serif" font-size="23" fill="#a16207" text-anchor="middle">
    And that is not difficult for Allah
  </text>
  
  <!-- Purpose/Benefit (smaller text) -->
  <text x="600" y="440" font-family="'Inter', sans-serif" font-size="19" fill="#b45309" text-anchor="middle" opacity="0.9">
    💰 For Relief from Debt · After ʿIshāʾ Prayer
  </text>
  
  <!-- Challenge Badge (bottom-right) -->
  <rect x="880" y="530" width="270" height="60" rx="30" fill="#78350f" opacity="0.95"/>
  <text x="1015" y="568" font-family="'Inter', sans-serif" font-size="20" font-weight="600" fill="#fef3c7" text-anchor="middle">
    Debt Relief Wird • Asrār
  </text>
</svg>
